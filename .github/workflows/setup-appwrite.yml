name: Prepare Appwrite backend

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Create and update NEXUS tables
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_ENDPOINT: https://nyc.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: menlun-control-360
          APPWRITE_DATABASE_ID: menlun_control_360
        run: node scripts/setup-appwrite.mjs

      - name: Prepare evidence storage
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_ENDPOINT: https://nyc.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: menlun-control-360
        run: node scripts/setup-appwrite-storage.mjs
