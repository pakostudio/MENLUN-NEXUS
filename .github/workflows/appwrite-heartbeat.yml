name: Appwrite heartbeat

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: appwrite-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Register backend heartbeat
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_ENDPOINT: https://nyc.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: menlun-control-360
          APPWRITE_DATABASE_ID: menlun_control_360
          APPWRITE_HEARTBEAT_TABLE_ID: bitacora
        run: node scripts/appwrite-heartbeat.mjs
